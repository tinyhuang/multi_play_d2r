name: Build & Test

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: CI Precheck (guard known regressions)
        shell: pwsh
        run: ./scripts/ci-precheck.ps1

      - name: Restore
        run: dotnet restore D2RMultiPlay.sln

      - name: Build
        run: dotnet build D2RMultiPlay.sln -c Release --no-restore

      - name: Test
        run: dotnet test D2RMultiPlay.sln -c Release --no-build --verbosity normal

      - name: Publish (Single File)
        run: dotnet publish src/D2RMultiPlay.App/D2RMultiPlay.App.csproj -c Release -r win-x64 --self-contained

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: D2RMultiPlay-win-x64
          path: src/D2RMultiPlay.App/bin/Release/net8.0-windows/win-x64/publish/
